apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud-mcp
  namespace: nextcloud-mcp
spec:
  interval: 24h
  chart:
    spec:
      chart: nextcloud-mcp-server
      version: "0.61.0"
      sourceRef:
        kind: HelmRepository
        name: cbcoutinho
        namespace: flux-system
      interval: 24h
  values:
    nextcloud:
      host: "https://cloud.seymour.family"
      mcpServerUrl: "https://cloud-mcp.seymour.family"
      publicIssuerUrl: "https://authentik.seymour.family/application/o/nextcloud/"

    extraEnv:
      - name: OIDC_DISCOVERY_URL
        value: "https://authentik.seymour.family/application/o/nextcloud/.well-known/op\
          enid-configuration"
      - name: NEXTCLOUD_OIDC_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: nextcloud-mcp-login-flow
            key: client_id
      - name: NEXTCLOUD_OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: nextcloud-mcp-login-flow
            key: client_secret
    auth:
      mode: oauth
      loginFlow:
        existingSecret: "nextcloud-mcp-login-flow"
        tokenEncryptionKeyKey: "token_encryption_key"
        persistence:
          enabled: true
          storageClass: "truenas-iscsi-csi"
          size: 100Mi

    dataStorage:
      enabled: true
      storageClass: "truenas-iscsi-csi"
      size: 1Gi

    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
      hosts:
        - host: cloud-mcp.seymour.family
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: nextcloud-mcp-tls
          hosts:
            - cloud-mcp.seymour.family

    serviceMonitor:
      enabled: true

    dashboards:
      enabled: true
