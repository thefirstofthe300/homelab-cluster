---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tubearchivist-redis
  namespace: tubearchivist
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tubearchivist-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tubearchivist-redis
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tubearchivist-redis
  namespace: tubearchivist
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tubearchivist-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
