apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tubearchivist
resources:
  - namespace.yaml
  - storage.yaml
  - configmap.yaml
  - sealedsecret.yaml
  - redis.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: tubearchivist
images:
  - name: bbilly1/tubearchivist
    newTag: v0.5.10
  - name: redis
    newTag: 7-alpine
