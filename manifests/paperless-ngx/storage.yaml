---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-ngx-consume
spec:
  storageClassName: node-manual
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions: []
  csi:
    driver: org.democratic-csi.node-manual
    readOnly: false
    fsType: nfs
    volumeHandle: talos-paperless-ngx-consume
    volumeAttributes:
      server: 192.168.1.100
      share: /mnt/media/data/paperless-ngx
      node_attach_driver: nfs
      provisioner_driver: node-manual
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-ngx-consume
  namespace: paperless-ngx
spec:
  storageClassName: node-manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
