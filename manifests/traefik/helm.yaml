apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 24h0m0s
  install:
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: traefik
      version: "40.2.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 24h0m0s
  values:
    deployment:
      replicas: 2
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
        transport:
          respondingTimeouts:
            readTimeout: 0s
            writeTimeout: 0s
            idleTimeout: 0s
      websecure:
        http3:
          enabled: true
        transport:
          respondingTimeouts:
            readTimeout: 0s
            writeTimeout: 0s
            idleTimeout: 0s
    service:
      spec:
        externalTrafficPolicy: Local
    logs:
      access:
        enabled: true
    metrics:
      prometheus:
        serviceMonitor:
          enabled: true
          relabelings:
            - action: replace
              sourceLabels:
                - exported_service
              targetLabel: service
