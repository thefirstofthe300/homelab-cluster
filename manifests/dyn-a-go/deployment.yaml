---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dyn-a-go
  namespace: dyn-a-go
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dyn-a-go
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dyn-a-go
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dyn-a-go
          image: ghcr.io/thefirstofthe300/dyn-a-go
          args:
            - run
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/dyn-a-go.conf
              subPath: dyn-a-go.conf
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: config
